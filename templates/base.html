<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTMON - {% block title %}Система моніторингу{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">📊 TTMON</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Дашборд</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/tasks/' in request.path %}active{% endif %}" href="/tasks/">Технічні завдання</a>
                </li>
            </ul>
            <span class="navbar-text">
                {% if user.is_authenticated %}
                    Привіт, {{ user.username }}!
                {% else %}
                    Гість
                {% endif %}
            </span>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>

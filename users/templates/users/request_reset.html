<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Відновлення пароля - TTMON</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #111; color: white; border-radius: 15px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; position: relative; overflow: hidden; }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #ff0050, #00f2fe); }
        .form-control { background: #222; border: 1px solid #333; color: white; }
        .form-control:focus { background: #222; color: white; border-color: #ff0050; box-shadow: 0 0 0 0.25rem rgba(255, 0, 80, 0.25); }
    </style>
</head>
<body>

<div class="login-card">
    <h4 class="text-center mb-3">Скидання пароля</h4>
    <p class="text-center text-muted mb-4" style="font-size: 0.9rem;">Введіть свій логін. Адміністратор отримає запит і згенерує для вас новий пароль.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label">Ваш Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <button type="submit" class="btn btn-light w-100 fw-bold mb-3">Надіслати запит</button>
        <div class="text-center">
            <a href="{% url 'login' %}" class="text-muted text-decoration-none">← Повернутися до входу</a>
        </div>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - TTMON</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #111; color: white; border-radius: 15px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; position: relative; overflow: hidden; }
        /* Неонові акценти TikTok */
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #00f2fe, #fe0979); }
        .form-control { background: #222; border: 1px solid #333; color: white; }
        .form-control:focus { background: #222; color: white; border-color: #fe0979; box-shadow: 0 0 0 0.25rem rgba(254, 9, 121, 0.25); }
        .btn-tiktok { background: linear-gradient(45deg, #fe0979, #00f2fe); border: none; color: white; font-weight: bold; width: 100%; }
        .btn-tiktok:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="text-center mb-3">📊 TTMON</h3>
    <p class="text-center text-muted mb-4">Увійдіть до свого облікового запису</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" style="font-size: 0.9rem;">
                {{ message }}
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% if form.errors %}
        <div class="alert alert-danger" role="alert" style="font-size: 0.9rem;">
            Неправильний логін або пароль. Спробуйте ще раз.
        </div>
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Логін (Username)</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-tiktok py-2">Увійти</button>

        <div class="text-center mt-3">
            <a href="{% url 'users:request_reset' %}" class="text-muted" style="text-decoration: underline; font-size: 0.9rem;">Забули пароль?</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
